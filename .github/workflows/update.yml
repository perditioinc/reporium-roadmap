name: Nightly Roadmap Update

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate README
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python generate.py

      - name: Configure git
        run: |
          git config user.name "perditio-bot"
          git config user.email "bot@perditio.com"

      - name: Commit and push
        run: |
          BUILD=$(cat BUILD 2>/dev/null || echo "0")
          BUILD=$((BUILD + 1))
          echo $BUILD > BUILD
          git add README.md BUILD
          git diff --staged --quiet || git commit -m "build($BUILD): nightly update $(date -u +%Y-%m-%d)"
          git push
